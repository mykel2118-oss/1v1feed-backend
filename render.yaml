services:
  - type: web
    name: 1v1feed-backend
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: 1v1feed-db
          property: connectionString

databases:
  - name: 1v1feed-db
    databaseName: 1v1feed
    user: postgres
